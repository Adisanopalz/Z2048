<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 - Play Now</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --app-height: 100vh;
            --board-bg: #bbada0;
            --cell-empty: rgba(238, 228, 218, 0.35);
        }

        body {
            /* Font Nunito memberikan kesan game yang lebih bulat dan "bouncy" */
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: var(--app-height);
            color: #776e65;
            touch-action: none; 
            -webkit-tap-highlight-color: transparent;
        }

        #app-container {
            width: 100%;
            height: 100%;
            max-width: 500px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        @keyframes floatingTitle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        .title-anim {
            animation: floatingTitle 3s ease-in-out infinite;
        }

        .score-container {
            background: #bbada0;
            padding: 0.5rem 1.5rem;
            border-radius: 12px;
            color: white;
            text-align: center;
            font-weight: 800;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        @keyframes floatScore {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(1.5); }
        }
        .score-addition {
            position: absolute;
            right: 20px;
            bottom: 15px;
            color: #776e65;
            font-size: 1.2rem;
            font-weight: 900;
            z-index: 100;
            animation: floatScore 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            pointer-events: none;
        }

        /* 2048 Game Board */
        #game-board {
            width: 100%;
            max-width: 420px;
            aspect-ratio: 1;
            background: var(--board-bg);
            border-radius: 16px;
            position: relative;
            box-shadow: 0 10px 30px rgba(187, 173, 160, 0.4);
            /* Memastikan touch area responsif */
            touch-action: none;
        }

        /* Layer untuk kotak alas (background cells) */
        #grid-bg {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .grid-cell {
            position: absolute;
            background: var(--cell-empty);
            border-radius: 10px;
        }

        /* Elemen Tile (Kotak Angka) */
        .tile {
            position: absolute;
            border-radius: 10px;
            font-weight: 800;
            font-size: 2rem;
            top: 0; left: 0;
            /* Animasi geser super mulus */
            transition: transform 120ms ease-in-out;
            will-change: transform; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        .tile-inner {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%; height: 100%;
            border-radius: inherit;
            /* Efek sedikit 3D pada kotaknya */
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.08);
            transition: background-color 150ms ease;
        }

        /* Animasi Muncul */
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .new-tile .tile-inner {
            animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Animasi Gabung */
        @keyframes mergePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); box-shadow: 0 0 20px rgba(255,255,255,0.8); }
            100% { transform: scale(1); }
        }
        .merged-tile .tile-inner {
            animation: mergePop 0.2s ease-in-out forwards;
        }

        /* Palet Warna Premium 2048 */
        .bg-2 { background: #eee4da; color: #776e65; }
        .bg-4 { background: #ede0c8; color: #776e65; }
        .bg-8 { background: #f2b179; color: #fff; }
        .bg-16 { background: #f59563; color: #fff; }
        .bg-32 { background: #f67c5f; color: #fff; }
        .bg-64 { background: #f65e3b; color: #fff; }
        .bg-128 { background: #edcf72; color: #fff; font-size: 1.6rem; box-shadow: 0 0 10px rgba(237, 207, 114, 0.3), inset 0 -3px 0 rgba(0,0,0,0.1) !important; }
        .bg-256 { background: #edcc61; color: #fff; font-size: 1.6rem; box-shadow: 0 0 15px rgba(237, 204, 97, 0.4), inset 0 -3px 0 rgba(0,0,0,0.1) !important; }
        .bg-512 { background: #edc850; color: #fff; font-size: 1.6rem; box-shadow: 0 0 20px rgba(237, 200, 80, 0.5), inset 0 -3px 0 rgba(0,0,0,0.1) !important; }
        .bg-1024 { background: #edc53f; color: #fff; font-size: 1.3rem; box-shadow: 0 0 25px rgba(237, 197, 63, 0.6), inset 0 -3px 0 rgba(0,0,0,0.1) !important; }
        .bg-2048 { background: #edc22e; color: #fff; font-size: 1.3rem; box-shadow: 0 0 30px rgba(237, 194, 46, 0.8), inset 0 -3px 0 rgba(0,0,0,0.1) !important; }

        /* Kartu Kemenangan (Reward) */
        #reward-section { z-index: 100; }
        #reward-card {
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            transform: scale(0) translateY(50px);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid #f1f5f9;
        }
        #reward-card.show { 
            transform: scale(1) translateY(0);
            opacity: 1;
        }
        
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Header -->
        <div class="header">
            <!-- Easter egg: ketuk judul 5x buat nyerah/bypass -->
            <div class="title-anim cursor-pointer select-none" id="secret-trigger">
                <h1 class="text-5xl font-black text-[#776e65] drop-shadow-sm">2048</h1>
                <p class="text-sm mt-1 text-[#776e65]/70 font-bold">Gabungkan angka!</p>
            </div>
            <div class="score-container" id="score-container">
                <div class="text-[11px] uppercase tracking-widest text-[#eee4da]">Skor</div>
                <div id="score" class="text-3xl leading-none mt-1">0</div>
            </div>
        </div>

        <!-- 2048 Board -->
        <div id="game-board">
            <div id="grid-bg">
                <!-- Background sel grid dimasukkan lewat JS supaya hitungannya akurat 100% -->
            </div>
            <!-- Tile aktif akan di-append di sini secara otomatis -->
        </div>

        <p class="mt-auto text-xs text-center text-[#776e65]/50 mb-4 font-bold flex items-center gap-1.5 bg-white/50 px-4 py-2 rounded-full shadow-sm">
            <i data-lucide="hand" class="w-4 h-4"></i> Swipe (Layar) / Arah Panah (PC)
        </p>

        <!-- LAYAR HADIAH RAHASIA -->
        <div id="reward-section" class="hidden absolute inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6">
            <div id="reward-card" class="text-center max-w-sm w-full relative overflow-hidden">
                <div class="relative z-10">
                    <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                        <i id="reward-icon" data-lucide="skull" class="w-10 h-10 text-emerald-600"></i>
                    </div>
                    <h2 id="reward-title" class="text-3xl font-black text-slate-800 mb-2">Game Over!</h2>
                    <p class="text-slate-600 mb-8 text-sm leading-relaxed font-medium">
                        Kamu mikir ini game beneran?<br>
                        <span class="font-black text-emerald-500 text-base animate-pulse block my-2">CUMA PENGALIHAN ISU AJA WKWK! 🤣</span>
                        Tujuan aslinya aku ngirimin link ini tuh buat ngasih kamu sesuatu. Coba klik di bawah:
                    </p>
                    
                    <button onclick="window.location.href='https://znovel.vercel.app/'" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 px-6 rounded-2xl shadow-[0_8px_20px_rgba(16,185,129,0.4)] transition-transform active:scale-95 flex items-center justify-center gap-2 group text-lg">
                        BUKA ZNOVEL <i data-lucide="arrow-right" class="w-6 h-6 group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();

        // Fix Viewport di Mobile
        const appHeight = () => { document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`); }
        window.addEventListener('resize', appHeight);
        appHeight();

        // --- SISTEM SUARA & GETARAN (HAPTIC) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function triggerHaptic(type) {
            if (navigator.vibrate) {
                if (type === 'slide') navigator.vibrate(10); 
                else if (type === 'merge') navigator.vibrate(25); 
                else if (type === 'gameover') navigator.vibrate([50, 50, 50]); 
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);

            if (type === 'slide') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(250, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'merge') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'tada') {
                const chords = [523.25, 659.25, 783.99, 1046.50];
                chords.forEach((freq, i) => {
                    setTimeout(() => {
                        const o = audioCtx.createOscillator(); 
                        const g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.type = 'triangle'; 
                        o.frequency.value = freq;
                        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
                        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                        o.start(); o.stop(audioCtx.currentTime + 0.5);
                    }, i * 100);
                });
            }
        }

        // --- EASTER EGG (KETUK JUDUL 5X UNTUK BYPASS) ---
        let titleTapCount = 0;
        let titleTapTimer;
        document.getElementById('secret-trigger').addEventListener('click', () => {
            titleTapCount++;
            clearTimeout(titleTapTimer);
            initAudio();
            if(audioCtx) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600 + (titleTapCount * 150), audioCtx.currentTime); 
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }
            if (titleTapCount >= 5) {
                showReward(true); 
                titleTapCount = 0;
            } else {
                titleTapTimer = setTimeout(() => { titleTapCount = 0; }, 1000); 
            }
        });

        // --- 2048 ENGINE BARU (PRESISI GRID) ---
        const boardSize = 4;
        let grid = []; 
        let tiles = []; 
        let tileIdCounter = 0;
        let score = 0;
        let gameActive = true;
        let justMergedPoints = 0;
        let deletedTilesThisTurn = [];

        const gameBoard = document.getElementById('game-board');
        const gridBg = document.getElementById('grid-bg');
        const scoreElement = document.getElementById('score');
        const scoreContainer = document.getElementById('score-container');

        // Parameter Layout Dasar
        const padding = 12; // Jarak tepi luar papan
        const gap = 12; // Jarak antar kotak

        // Hitung ukuran sel secara matematis agar background dan foreground 100% sejajar
        function getTileDimensions() {
            const boardWidth = gameBoard.clientWidth;
            const innerWidth = boardWidth - (padding * 2);
            const tileSize = (innerWidth - (gap * (boardSize - 1))) / boardSize;
            return tileSize;
        }

        // Buat grid alas (background) menggunakan absolute positioning
        function initGridBg() {
            gridBg.innerHTML = '';
            const tileSize = getTileDimensions();

            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    
                    const x = padding + c * (tileSize + gap);
                    const y = padding + r * (tileSize + gap);
                    
                    cell.style.transform = `translate(${x}px, ${y}px)`;
                    cell.style.width = `${tileSize}px`;
                    cell.style.height = `${tileSize}px`;
                    gridBg.appendChild(cell);
                }
            }
        }

        function initGame() {
            initGridBg();
            
            document.querySelectorAll('.tile').forEach(t => t.remove());
            grid = Array(boardSize).fill().map(() => Array(boardSize).fill(null));
            tiles = [];
            score = 0;
            scoreElement.innerText = score;
            gameActive = true;

            addRandomTile();
            addRandomTile();
            renderTiles();
        }

        function addRandomTile() {
            let empty = [];
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    if (!grid[r][c]) empty.push({ r, c });
                }
            }
            if (empty.length > 0) {
                let pos = empty[Math.floor(Math.random() * empty.length)];
                let val = Math.random() < 0.9 ? 2 : 4;
                
                let newTile = {
                    id: tileIdCounter++,
                    r: pos.r, c: pos.c,
                    value: val,
                    isNew: true,
                    isMerged: false
                };
                
                grid[pos.r][pos.c] = newTile;
                tiles.push(newTile);
            }
        }

        // Logic memproses baris saat digeser
        function processLine(line) {
            let newLine = [];
            let i = 0;
            while (i < line.length) {
                if (i < line.length - 1 && line[i].value === line[i + 1].value) {
                    let target = line[i];
                    let source = line[i + 1];
                    
                    target.value *= 2;
                    target.isMerged = true;
                    
                    source.isDeleted = true;
                    source.mergeTarget = target; 
                    deletedTilesThisTurn.push(source);
                    
                    newLine.push(target);
                    score += target.value;
                    justMergedPoints += target.value;
                    i += 2;
                } else {
                    newLine.push(line[i]);
                    i++;
                }
            }
            return newLine;
        }

        function move(direction) {
            let moved = false;
            justMergedPoints = 0;
            deletedTilesThisTurn = [];

            tiles.forEach(t => { t.isNew = false; t.isMerged = false; });

            if (direction === 'Left' || direction === 'Right') {
                for (let r = 0; r < boardSize; r++) {
                    let line = [];
                    for (let c = 0; c < boardSize; c++) if (grid[r][c]) line.push(grid[r][c]);
                    if (direction === 'Right') line.reverse();
                    
                    let newLine = processLine(line);
                    
                    for (let c = 0; c < boardSize; c++) {
                        let actualC = direction === 'Right' ? boardSize - 1 - c : c;
                        grid[r][actualC] = c < newLine.length ? newLine[c] : null;
                        
                        if (grid[r][actualC]) {
                            if (grid[r][actualC].r !== r || grid[r][actualC].c !== actualC) moved = true;
                            grid[r][actualC].r = r;
                            grid[r][actualC].c = actualC;
                        }
                    }
                }
            } else if (direction === 'Up' || direction === 'Down') {
                for (let c = 0; c < boardSize; c++) {
                    let line = [];
                    for (let r = 0; r < boardSize; r++) if (grid[r][c]) line.push(grid[r][c]);
                    if (direction === 'Down') line.reverse();
                    
                    let newLine = processLine(line);
                    
                    for (let r = 0; r < boardSize; r++) {
                        let actualR = direction === 'Down' ? boardSize - 1 - r : r;
                        grid[actualR][c] = r < newLine.length ? newLine[r] : null;
                        
                        if (grid[actualR][c]) {
                            if (grid[actualR][c].r !== actualR || grid[actualR][c].c !== c) moved = true;
                            grid[actualR][c].r = actualR;
                            grid[actualR][c].c = c;
                        }
                    }
                }
            }

            // Atur posisi tujuan untuk kotak yang menabrak/dihapus (biar animasinya ngejar)
            deletedTilesThisTurn.forEach(t => {
                t.r = t.mergeTarget.r;
                t.c = t.mergeTarget.c;
            });

            return moved || deletedTilesThisTurn.length > 0;
        }

        function checkGameOver() {
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    if (!grid[r][c]) return false;
                    let val = grid[r][c].value;
                    if (r < boardSize - 1 && grid[r + 1][c] && grid[r + 1][c].value === val) return false;
                    if (c < boardSize - 1 && grid[r][c + 1] && grid[r][c + 1].value === val) return false;
                }
            }
            return true;
        }

        // Merender ulang kotak tanpa bug layout (presisi matematis)
        function renderTiles() {
            const tileSize = getTileDimensions();
            let allRenderingTiles = tiles.concat(deletedTilesThisTurn);

            allRenderingTiles.forEach(tile => {
                let el = document.getElementById(`t-${tile.id}`);
                
                if (!el) {
                    el = document.createElement('div');
                    el.id = `t-${tile.id}`;
                    el.className = 'tile';
                    
                    let inner = document.createElement('div');
                    inner.className = 'tile-inner';
                    el.appendChild(inner);
                    gameBoard.appendChild(el);
                }

                // Kalkulasi absolute (Pasti 100% cocok dengan grid alas)
                const x = padding + tile.c * (tileSize + gap);
                const y = padding + tile.r * (tileSize + gap);

                el.style.transform = `translate(${x}px, ${y}px)`;
                el.style.width = `${tileSize}px`;
                el.style.height = `${tileSize}px`;

                let inner = el.querySelector('.tile-inner');
                inner.innerText = tile.value;
                inner.className = `tile-inner bg-${tile.value > 2048 ? '2048' : tile.value}`;

                if (tile.isNew) el.classList.add('new-tile');
                else el.classList.remove('new-tile');

                if (tile.isMerged) el.classList.add('merged-tile');
                else el.classList.remove('merged-tile');

                // Taruh kotak yang hancur di bawah kotak yang baru bergabung
                if (tile.isDeleted) el.style.zIndex = '0'; 
                else el.style.zIndex = '10';
            });

            // Clean up memory
            let cleanupList = [...deletedTilesThisTurn];
            tiles = tiles.filter(t => !t.isDeleted); 
            
            setTimeout(() => {
                cleanupList.forEach(t => {
                    let el = document.getElementById(`t-${t.id}`);
                    if (el) el.remove();
                });
            }, 120); // Sesuai dengan durasi CSS transition (120ms)
        }

        function showFloatingScore(points) {
            if (points <= 0) return;
            const addition = document.createElement('div');
            addition.className = 'score-addition';
            addition.innerText = `+${points}`;
            scoreContainer.appendChild(addition);
            setTimeout(() => addition.remove(), 800);
        }

        function handleInput(direction) {
            if (!gameActive) return;
            initAudio(); 

            let moved = move(direction);

            if (moved) {
                if (justMergedPoints > 0) {
                    triggerHaptic('merge');
                    playSound('merge');
                    showFloatingScore(justMergedPoints);
                    scoreElement.innerText = score;
                } else {
                    triggerHaptic('slide');
                    playSound('slide');
                }

                addRandomTile();
                renderTiles();

                if (checkGameOver()) {
                    gameActive = false;
                    setTimeout(() => showReward(false), 800);
                }
            }
        }

        // --- Keyboard (PC) ---
        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault(); 
                handleInput(e.key.replace('Arrow', ''));
            }
        });

        // --- Swipe (Touch) ---
        let touchStartX = 0; let touchStartY = 0;
        
        gameBoard.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: false });

        gameBoard.addEventListener('touchmove', e => {
            e.preventDefault(); // Kunci scroll
        }, { passive: false });

        gameBoard.addEventListener('touchend', e => {
            let dx = e.changedTouches[0].screenX - touchStartX;
            let dy = e.changedTouches[0].screenY - touchStartY;
            
            if (Math.abs(dx) < 25 && Math.abs(dy) < 25) return; // Lebih responsif

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0) handleInput('Right');
                else handleInput('Left');
            } else {
                if (dy > 0) handleInput('Down');
                else handleInput('Up');
            }
        });

        // --- TAMPILKAN HADIAH (PLOT TWIST) ---
        function showReward(isSurrender = false) {
            initAudio();
            triggerHaptic('gameover');
            gameActive = false;
            
            const title = document.getElementById('reward-title');
            const icon = document.getElementById('reward-icon');
            
            if (isSurrender) {
                title.innerText = "Cieee Nyerah!";
                icon.setAttribute('data-lucide', 'laugh');
            } else {
                title.innerText = "Yaaah, Game Over!";
                icon.setAttribute('data-lucide', 'skull');
            }
            lucide.createIcons();

            const rewardSection = document.getElementById('reward-section');
            const rewardCard = document.getElementById('reward-card');
            
            rewardSection.classList.remove('hidden');
            setTimeout(() => {
                rewardCard.classList.add('show');
                playSound('tada'); 
            }, 100);
        }

        // Saat layar diputar/berubah ukuran, kalkulasi ulang dan update posisi secara instan!
        window.addEventListener('resize', () => {
            initGridBg();
            renderTiles();
        });

        // Mulai Game
        initGame();

    </script>
</body>
</html>
