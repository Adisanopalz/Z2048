<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 - Play Now</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --app-height: 100vh;
        }

        body {
            font-family: 'Poppins', sans-serif;
            /* Animated Gradient Background biar gak kaku */
            background: linear-gradient(-45deg, #faf8ef, #f2e8cf, #fdf6e3, #eee4da);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: var(--app-height);
            color: #776e65;
            touch-action: none; /* Cegah scroll saat main */
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #app-container {
            width: 100%;
            height: 100%;
            max-width: 480px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
        }

        /* Top Bar */
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            margin-top: 1rem;
        }

        /* Bouncing Title */
        @keyframes floatingTitle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .title-anim {
            animation: floatingTitle 3s ease-in-out infinite;
            text-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .score-container {
            background: #bbada0;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            color: white;
            text-align: center;
            font-weight: bold;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* Floating Score Animation (+X) */
        @keyframes floatScore {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(1.5); }
        }
        .score-addition {
            position: absolute;
            right: 15px;
            bottom: 10px;
            color: rgba(119, 110, 101, 0.9);
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 100;
            animation: floatScore 0.8s ease-out forwards;
            pointer-events: none;
        }

        /* 2048 Grid */
        #game-board {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            background: #bbada0;
            border-radius: 12px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1), 0 10px 30px rgba(0,0,0,0.1);
        }

        .grid-cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 8px;
        }

        .tile {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.8rem;
            transition: 100ms ease-in-out;
            animation: pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes mergePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); box-shadow: 0 0 15px rgba(255,255,255,0.8); }
            100% { transform: scale(1); }
        }
        .merged-tile {
            animation: mergePop 0.2s ease-in-out;
        }

        /* Warna Tile 2048 */
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 1.5rem; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 1.5rem; box-shadow: 0 0 10px rgba(243, 215, 116, 0.5); }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 1.5rem; box-shadow: 0 0 15px rgba(243, 215, 116, 0.6); }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.2rem; box-shadow: 0 0 20px rgba(243, 215, 116, 0.7); }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.2rem; box-shadow: 0 0 30px rgba(243, 215, 116, 0.8); }

        /* Kartu Kemenangan (Hidden Target) */
        #reward-section {
            z-index: 50;
        }
        #reward-card {
            background: white;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transform: scale(0);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid #e2e8f0;
        }
        #reward-card.show {
            transform: scale(1);
        }
    </style>
</head>
<body>

    <div id="app-container">
        
        <!-- Header -->
        <div class="header">
            <div class="title-anim cursor-pointer select-none" id="secret-trigger">
                <h1 class="text-4xl font-extrabold text-[#776e65]">2048</h1>
                <p class="text-sm mt-1 text-[#776e65]/70">Gabungkan angka ke 2048!</p>
            </div>
            <div class="score-container" id="score-container">
                <div class="text-[10px] uppercase tracking-wider text-[#eee4da]">Skor</div>
                <div id="score" class="text-2xl leading-none mt-1">0</div>
            </div>
        </div>

        <!-- 2048 Board -->
        <div id="game-board">
            <!-- Grid Background generated by JS -->
        </div>

        <p class="mt-auto text-xs text-center text-[#776e65]/40 mb-4 font-medium flex items-center gap-1">
            <i data-lucide="hand" class="w-3 h-3"></i> Swipe (HP) atau Arrow Keys (PC)
        </p>

        <!-- BAGIAN 2: HADIAH RAHASIA (Link ZNovel) -->
        <div id="reward-section" class="hidden absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-6">
            <div id="reward-card" class="text-center max-w-sm w-full relative overflow-hidden">
                <div class="relative z-10">
                    <i id="reward-icon" data-lucide="skull" class="w-16 h-16 text-slate-800 mx-auto mb-4"></i>
                    <h2 id="reward-title" class="text-2xl font-bold text-slate-800 mb-2">Yaaah, Game Over!</h2>
                    <p class="text-slate-600 mb-8 text-sm leading-relaxed">
                        Kamu mikir ini game beneran?<br>
                        <span class="font-bold text-emerald-500 animate-pulse block my-2">INI CUMA PENGALIHAN ISU AJA WKWK! 🤣</span>
                        Tujuan aslinya aku ngirimin link ini tuh buat ngasih kamu sesuatu. Coba buka link rahasia di bawah ini:
                    </p>
                    
                    <button onclick="window.location.href='https://znovel.vercel.app/'" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 px-6 rounded-2xl shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2 group">
                        BUKA ZNOVEL <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();

        // Fix Viewport Height issue on Mobile
        const appHeight = () => {
            const doc = document.documentElement;
            doc.style.setProperty('--app-height', `${window.innerHeight}px`);
        }
        window.addEventListener('resize', appHeight);
        appHeight();

        // --- EASTER EGG LOGIC (NYERAH) ---
        let titleTapCount = 0;
        let titleTapTimer;
        document.getElementById('secret-trigger').addEventListener('click', () => {
            titleTapCount++;
            clearTimeout(titleTapTimer);
            
            // Tambahkan efek suara misterius tiap ketukan
            initAudio();
            if(audioCtx) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600 + (titleTapCount * 150), audioCtx.currentTime); // Nada makin naik
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }

            if (titleTapCount >= 5) {
                showReward(true); // Panggil fungsi nyerah/menang
                titleTapCount = 0;
            } else {
                titleTapTimer = setTimeout(() => {
                    titleTapCount = 0;
                }, 1000); // Hitungan direset kalau jeda ketukan kelamaan
            }
        });

        // --- AUDIO ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);

            if (type === 'slide') {
                // Bunyi swoosh/gesek pelan
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'merge') {
                // Bunyi pop/ting saat gabung
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'tada') {
                // Bunyi kejutan saat pop up muncul
                const chords = [523.25, 659.25, 783.99, 1046.50];
                chords.forEach((freq, i) => {
                    setTimeout(() => {
                        const o = audioCtx.createOscillator(); 
                        const g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.type = 'triangle'; 
                        o.frequency.value = freq;
                        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
                        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                        o.start(); o.stop(audioCtx.currentTime + 0.5);
                    }, i * 100);
                });
            }
        }

        // --- 2048 GAME LOGIC ---
        const boardSize = 4;
        let grid = [];
        let score = 0;
        const gameBoard = document.getElementById('game-board');
        const scoreElement = document.getElementById('score');
        const scoreContainer = document.getElementById('score-container');
        let gameActive = true;
        let justMergedPoints = 0;

        // Initialize grid
        function initGame() {
            gameBoard.innerHTML = '';
            grid = [];
            score = 0;
            scoreElement.innerText = score;
            gameActive = true;

            for (let i = 0; i < boardSize * boardSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                gameBoard.appendChild(cell);
            }

            for (let r = 0; r < boardSize; r++) {
                grid.push(new Array(boardSize).fill(0));
            }

            addRandomTile();
            addRandomTile();
            renderBoard();
        }

        function addRandomTile() {
            let emptyCells = [];
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    if (grid[r][c] === 0) {
                        emptyCells.push({ r, c });
                    }
                }
            }

            if (emptyCells.length > 0) {
                let randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[randomCell.r][randomCell.c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function renderBoard() {
            document.querySelectorAll('.tile').forEach(tile => tile.remove());

            const cellWidth = gameBoard.clientWidth / boardSize;
            const gap = 10; 

            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    if (grid[r][c] !== 0) {
                        const tile = document.createElement('div');
                        const value = grid[r][c];
                        tile.className = `tile tile-${value > 2048 ? '2048' : value}`;
                        tile.innerText = value;
                        
                        const top = r * (cellWidth) + 10;
                        const left = c * (cellWidth) + 10;
                        const size = cellWidth - gap;

                        tile.style.top = `${top}px`;
                        tile.style.left = `${left}px`;
                        tile.style.width = `${size}px`;
                        tile.style.height = `${size}px`;

                        gameBoard.appendChild(tile);
                    }
                }
            }
        }

        // Animasi floating score (+X)
        function showFloatingScore(points) {
            if(points <= 0) return;
            const addition = document.createElement('div');
            addition.className = 'score-addition';
            addition.innerText = `+${points}`;
            scoreContainer.appendChild(addition);
            setTimeout(() => addition.remove(), 800);
        }

        // --- Gerakan (Slide & Merge) ---
        function slide(row) {
            let arr = row.filter(val => val);
            let missing = boardSize - arr.length;
            let zeros = Array(missing).fill(0);
            return arr.concat(zeros);
        }

        function combine(row) {
            for (let i = 0; i < boardSize - 1; i++) {
                if (row[i] !== 0 && row[i] === row[i + 1]) {
                    row[i] *= 2;
                    row[i + 1] = 0;
                    score += row[i];
                    justMergedPoints += row[i]; // Kumpulkan poin merge dalam 1 gerakan
                }
            }
            return row;
        }

        function move(direction) {
            let moved = false;
            justMergedPoints = 0;

            for (let i = 0; i < boardSize; i++) {
                let line = [];
                // Ambil line berdasarkan arah
                for (let j = 0; j < boardSize; j++) {
                    if (direction === 'Left' || direction === 'Right') line.push(grid[i][j]);
                    else line.push(grid[j][i]);
                }

                let oldLine = [...line];

                if (direction === 'Right' || direction === 'Down') line.reverse();
                line = slide(line);
                line = combine(line);
                line = slide(line);
                if (direction === 'Right' || direction === 'Down') line.reverse();

                // Kembalikan ke grid
                for (let j = 0; j < boardSize; j++) {
                    if (direction === 'Left' || direction === 'Right') grid[i][j] = line[j];
                    else grid[j][i] = line[j];
                }

                if (oldLine.join(',') !== line.join(',')) moved = true;
            }
            return moved;
        }

        function checkGameOver() {
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    if (grid[r][c] === 0) return false;
                }
            }
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    let current = grid[r][c];
                    if (r < boardSize - 1 && grid[r + 1][c] === current) return false;
                    if (c < boardSize - 1 && grid[r][c + 1] === current) return false;
                }
            }
            return true;
        }

        function handleInput(direction) {
            if (!gameActive) return;
            initAudio(); // Pastikan audio aktif

            let moved = move(direction);

            if (moved) {
                // Audio Feedback
                if (justMergedPoints > 0) {
                    playSound('merge');
                    showFloatingScore(justMergedPoints);
                    scoreElement.innerText = score;
                } else {
                    playSound('slide');
                }

                addRandomTile();
                renderBoard();

                if (checkGameOver()) {
                    gameActive = false;
                    setTimeout(() => showReward(false), 800);
                }
            }
        }

        // --- Controls Keyboard ---
        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault(); 
                handleInput(e.key.replace('Arrow', ''));
            }
        });

        // --- Controls Swipe (Touch) ---
        let touchStartX = 0;
        let touchStartY = 0;
        gameBoard.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: false });

        gameBoard.addEventListener('touchmove', e => {
            e.preventDefault(); 
        }, { passive: false });

        gameBoard.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
        });

        function handleSwipe(startX, startY, endX, endY) {
            let dx = endX - startX;
            let dy = endY - startY;
            
            if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0) handleInput('Right');
                else handleInput('Left');
            } else {
                if (dy > 0) handleInput('Down');
                else handleInput('Up');
            }
        }

        // --- TAMPILKAN HADIAH (PLOT TWIST) ---
        function showReward(isSurrender = false) {
            initAudio();
            gameActive = false;
            
            const title = document.getElementById('reward-title');
            const icon = document.getElementById('reward-icon');
            
            if (isSurrender) {
                title.innerText = "Cieee Nyerah!";
                icon.setAttribute('data-lucide', 'laugh');
            } else {
                title.innerText = "Yaaah, Game Over!";
                icon.setAttribute('data-lucide', 'skull');
            }
            lucide.createIcons();

            const rewardSection = document.getElementById('reward-section');
            const rewardCard = document.getElementById('reward-card');
            
            rewardSection.classList.remove('hidden');
            setTimeout(() => {
                rewardCard.classList.add('show');
                playSound('tada'); // Suara kejutan muncul!
            }, 100);
        }

        // Resize event 
        window.addEventListener('resize', renderBoard);

        // Start!
        initGame();

    </script>
</body>
</html>
